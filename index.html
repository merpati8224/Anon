<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunTools - Merpati Premium ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --pink-soft: #ffdee9; --pink-bold: #ff85a2; --cream: #fff5f5; --text: #7d5a5a; }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); margin: 0; color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh;}
        
        .ad-box { width: 100%; max-width: 400px; min-height: 50px; margin: 10px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fff0f3; border-radius: 15px; overflow: hidden; border: 1px dashed var(--pink-bold); font-size: 10px; color: var(--pink-bold); padding: 5px; box-sizing: border-box; }

        nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); width: 100%; display: none; justify-content: space-around; padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--pink-soft); }
        nav button { background: none; border: none; font-weight: 600; font-size: 11px; cursor: pointer; color: var(--text); }

        .container { background: white; width: 92%; max-width: 400px; margin: 15px auto; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(255,182,193,0.2); text-align: center; box-sizing: border-box; flex-grow: 1;}
        h2 { font-family: 'Dancing Script', cursive; color: var(--pink-bold); font-size: 30px; margin-bottom: 20px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #fff5f6; border-radius: 12px; font-family: 'Poppins', sans-serif; box-sizing: border-box; outline: none; }
        .main-btn { background: linear-gradient(45deg, #ffb6c1, #ff85a2); color: white; border: none; padding: 14px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: transform 0.1s; }
        .main-btn:active { transform: scale(0.98); }

        .visual-container { margin-top: 20px; padding: 15px; background: #fffcfc; border-radius: 20px; display: none; border: 1px solid var(--pink-soft); }
        .body-img-container { width: 100%; display: flex; justify-content: center; margin: 15px 0; }
        .body-img { width: 120px; height: auto; display: block; filter: drop-shadow(0 5px 8px rgba(255,133,162,0.3)); }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--pink-soft); border-top: 4px solid var(--pink-bold); border-radius: 50%; animation: spin 1s infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .content-page, .sub-page { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .content-page.active, .sub-page.active { display: block; opacity: 1; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Memuat...</p></div>

<div class="ad-box">
    <script src="https://pl28970450.profitablecpmratenetwork.com/34/83/cc/3483cc01879a0b87f5698fca3d8b6067.js"></script>
</div>

<nav id="main-nav">
    <button onclick="showSubPage('ideal')">📏 Ideal</button>
    <button onclick="showSubPage('pesan')">📩 Pesan</button>
    <button onclick="showSubPage('jodoh')">❤️ Jodoh</button>
    <button onclick="window.logout()">🚪 Keluar</button>
</nav>

<div class="container">
    <section id="page-login" class="content-page active">
        <h2>Halo, Merpati! ✨</h2>
        <p style="font-size: 12px; color: #aaa;">Masuk untuk melihat pesan rahasiamu</p>
        <button class="main-btn" onclick="window.handleLogin()">Masuk dengan Google</button>
    </section>

    <div id="main-content" class="content-page">
        <section id="ideal" class="sub-page active">
            <h2>Body Visualizer</h2>
            <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 10px;">
                <label><input type="radio" name="gender" value="pria" id="genderPria"> 👨 Pria</label>
                <label><input type="radio" name="gender" value="wanita" id="genderWanita" checked> 👩 Wanita</label>
            </div>
            <input type="number" id="tinggi" placeholder="Tinggi (cm)">
            <input type="number" id="berat" placeholder="Berat (kg)">
            <button class="main-btn" onclick="window.hitungVisual()">Lihat Bentuk Tubuh</button>
            
            <div id="hasilBMI" class="visual-container">
                <p id="status-teks" style="font-weight:bold; font-size: 18px; color: var(--pink-bold); margin-bottom: 5px;"></p>
                <div class="body-img-container">
                    <img id="img-visual" class="body-img" src="" alt="Visualisasi">
                </div>
                <p id="bmi-angka" style="font-size: 14px; color: #999; margin-bottom: 10px;"></p>
                <p id="ukuran-badan" style="font-size:12px; font-weight: 600; color: var(--text); background: #fff5f6; padding: 10px; border-radius: 10px; border: 1px solid var(--pink-soft);"></p>
                <p id="saran-teks" style="font-size:12px; margin-top:10px; line-height: 1.5;"></p>
            </div>
        </section>

        <section id="pesan" class="sub-page">
            <h2>Kotak Rahasia</h2>
            <div id="link-display" style="font-size:10px; background:#f9f9f9; padding:10px; border-radius:10px; word-break:break-all; border: 1px solid #eee;"></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;">
                <button class="main-btn" style="font-size:10px;" onclick="window.copyLink()">Salin Link</button>
                <button class="main-btn" style="font-size:10px; background:#25D366;" onclick="window.shareWA()">WhatsApp</button>
            </div>
            <div id="list-pesan" style="margin-top:20px; max-height: 300px; overflow-y: auto;"></div>
        </section>

        <section id="jodoh" class="sub-page">
            <h2>Love Meter</h2>
            <input type="text" id="nama1" placeholder="Nama Kamu">
            <input type="text" id="nama2" placeholder="Nama Pasangan">
            <button class="main-btn" onclick="window.cekJodoh()">Cek ❤️</button>
            <h1 id="hasilJodoh" style="color:var(--pink-bold);"></h1>
            <div style="margin-top:15px;">
                <script> atOptions = { 'key' : '0d9622e9e779ea401d2f05433e1b0674', 'format' : 'iframe', 'height' : 250, 'width' : 300, 'params' : {} }; </script>
                <script src="https://www.highperformanceformat.com/0d9622e9e779ea401d2f05433e1b0674/invoke.js"></script>
            </div>
        </section>
    </div>

    <section id="page-send-msg" class="content-page">
        <h2>Kirim Pesan ✨</h2>
        <p style="font-size: 11px; margin-bottom: 10px;">Tulis pesan rahasiamu secara anonim.</p>
        <textarea id="anon-text" rows="4" placeholder="Tulis rahasia di sini..."></textarea>
        <button class="main-btn" onclick="window.sendToFirebase()">Kirim Sekarang 🤫</button>
        <p style="font-size: 10px; margin-top: 15px; color: #ccc;">Muat ulang halaman untuk buat kotakmu sendiri.</p>
    </section>
</div>

<div class="ad-box">
    <script async="async" data-cfasync="false" src="https://pl28974414.profitablecpmratenetwork.com/fbffb4771c2d97dea17ecc5378bee6a5/invoke.js"></script>
    <div id="container-fbffb4771c2d97dea17ecc5378bee6a5"></div>
</div>

<div class="footer-name" style="color:#ccc; font-size:10px; margin-bottom:20px;">merpati digital creative</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBRUMOALHTCiJ83lBc1KaYc0QcsSIfw5ek",
        authDomain: "webanonymous-128cd.firebaseapp.com",
        projectId: "webanonymous-128cd",
        storageBucket: "webanonymous-128cd.firebasestorage.app",
        messagingSenderId: "789801328425",
        appId: "1:789801328425:web:67467f05e1e2fa2ecba138"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // TANGKAP ID DARI LINK
    const urlParams = new URLSearchParams(window.location.search);
    const idTujuan = urlParams.get('to'); 

    window.handleLogin = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth).then(() => { 
        window.location.href = window.location.origin + window.location.pathname; 
    });

    onAuthStateChanged(auth, (user) => {
        document.getElementById('loader').style.display = 'none';
        document.querySelectorAll('.content-page').forEach(s => s.classList.remove('active'));
        
        if (idTujuan) {
            // Jika buka link orang lain, langsung ke halaman kirim pesan
            document.getElementById('page-send-msg').classList.add('active');
            document.getElementById('main-nav').style.display = 'none';
        } else if (user) {
            // Jika login sendiri, buka dashboard
            document.getElementById('main-content').classList.add('active'); 
            document.getElementById('main-nav').style.display = 'flex';
            setupUser(user);
        } else {
            // Jika baru buka web, ke halaman login
            document.getElementById('page-login').classList.add('active');
        }
    });

    window.showSubPage = (id) => {
        document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setupUser(user) {
        // Buat link dengan UID asli Google
        const myLink = window.location.origin + window.location.pathname + "?to=" + user.uid;
        document.getElementById('link-display').innerText = myLink;
        
        // Ambil pesan berdasarkan receiverID (UID Google)
        const q = query(collection(db, "messages"), where("receiverID", "==", user.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            let html = ""; 
            snapshot.forEach(doc => {
                html += `<div style="background:#fff; border: 1px solid var(--pink-soft); padding:12px; margin:8px 0; border-left:5px solid var(--pink-bold); text-align:left; font-size:13px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02);">${doc.data().text}</div>`;
            });
            document.getElementById('list-pesan').innerHTML = html || "<p style='font-size:12px; color:#aaa; margin-top:20px;'>Belum ada pesan rahasia yang masuk.</p>";
        });
    }

    // --- FIX VISUALIZER GENDER & UKURAN ---
    window.hitungVisual = () => {
        const isWanita = document.getElementById('genderWanita').checked;
        const bb = parseFloat(document.getElementById('berat').value);
        const tb = parseFloat(document.getElementById('tinggi').value);
        
        if(!bb || !tb) return alert("Isi data tinggi dan berat dulu!");

        const bmi = bb / ((tb/100)**2);
        const resContainer = document.getElementById('hasilBMI');
        resContainer.style.display = "block";
        
        let txt = "", img = "", srn = "", detil = "";

        if(isWanita) {
            detil = `Bust: ${(tb*0.53).toFixed(0)}cm | Waist: ${(tb*0.39).toFixed(0)}cm | Hips: ${(tb*0.55).toFixed(0)}cm`;
            if(bmi < 18.5) {
                txt = "Kurus (Underweight)";
                img = "https://cdn-icons-png.flaticon.com/512/6997/6997666.png"; 
            } else if(bmi < 24.9) {
                txt = "Ideal ✨";
                img = "https://cdn-icons-png.flaticon.com/512/6997/6997671.png";
            } else {
                txt = "Berisi / Overweight";
                img = "https://cdn-icons-png.flaticon.com/512/6998/6998065.png";
            }
            srn = "Jaga pola makan sehat ya cantik!";
        } else {
            detil = `Chest: ${(tb*0.55).toFixed(0)}cm | Waist: ${(tb*0.45).toFixed(0)}cm | Shoulders: ${(tb*0.60).toFixed(0)}cm`;
            if(bmi < 18.5) {
                txt = "Kurus (Underweight)";
                img = "https://cdn-icons-png.flaticon.com/512/4202/4202831.png";
            } else if(bmi < 24.9) {
                txt = "Ideal ✨";
                img = "https://cdn-icons-png.flaticon.com/512/4202/4202843.png";
            } else {
                txt = "Berisi / Overweight";
                img = "https://cdn-icons-png.flaticon.com/512/4202/4202835.png";
            }
            srn = "Tetap aktif berolahraga bro!";
        }

        document.getElementById('status-teks').innerText = txt;
        document.getElementById('bmi-angka').innerText = `Skor BMI: ${bmi.toFixed(1)}`;
        document.getElementById('ukuran-badan').innerText = "Estimasi Ukuran: " + detil;
        document.getElementById('img-visual').src = img;
        document.getElementById('saran-teks').innerText = srn;
    };

    // --- FIX PENGIRIMAN PESAN KE UID ---
    window.sendToFirebase = async () => {
        const text = document.getElementById('anon-text').value;
        if(!text) return alert("Pesan tidak boleh kosong!");
        if(!idTujuan) return alert("ID Penerima tidak ditemukan dalam link!");

        try {
            await addDoc(collection(db, "messages"), { 
                receiverID: idTujuan, // Menggunakan ID Diana dari link (?to=...)
                text: text, 
                timestamp: serverTimestamp() 
            });
            alert("Pesan rahasia terkirim! 🤫");
            document.getElementById('anon-text').value = ''; 
        } catch (e) {
            console.error(e);
            alert("Gagal kirim. Cek Rules Firestore Anda.");
        }
    };

    window.copyLink = () => { navigator.clipboard.writeText(document.getElementById('link-display').innerText).then(()=>alert("Link tersalin!")); };
    window.shareWA = () => { window.open("https://wa.me/?text=Hai! Kirim pesan rahasia ke aku yuk, anonim kok 🤫: " + document.getElementById('link-display').innerText); };
    window.cekJodoh = () => { 
        const n1 = document.getElementById('nama1').value;
        const n2 = document.getElementById('nama2').value;
        if(!n1 || !n2) return alert("Isi kedua namanya dulu!");
        document.getElementById('hasilJodoh').innerText = Math.floor(Math.random()*40 + 60) + "% ❤️"; 
    };
</script>

</body>
</html>
