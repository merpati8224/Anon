<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunTools - Merpati Premium ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --pink-soft: #ffdee9; 
            --pink-bold: #ff85a2; 
            --cream: #fff5f5; 
            --text: #7d5a5a;
            --white-glass: rgba(255, 255, 255, 0.9);
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background: linear-gradient(135deg, var(--cream) 0%, #ffffff 100%);
            margin: 0; color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        #loader { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 1000; display: flex; justify-content: center; align-items: center; flex-direction: column; 
        }
        .spinner { width: 50px; height: 50px; border: 5px solid var(--pink-soft); border-top: 5px solid var(--pink-bold); border-radius: 50%; animation: spin 1s infinite; }

        nav { 
            background: var(--white-glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            width: 100%; display: none; justify-content: space-around; padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 133, 162, 0.1);
        }
        nav button { background: none; border: none; color: var(--text); font-weight: 600; cursor: pointer; font-size: 11px; display: flex; flex-direction: column; align-items: center; transition: 0.3s;}
        nav button:hover { color: var(--pink-bold); }

        .container { 
            background: white; width: 92%; max-width: 400px; margin: 20px auto; padding: 25px; border-radius: 35px; 
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.1); text-align: center; border: 1px solid #fff1f3; box-sizing: border-box;
        }

        h2 { font-family: 'Dancing Script', cursive; color: var(--pink-bold); font-size: 32px; margin: 10px 0 20px; }

        input, textarea, select { width: 100%; padding: 14px; margin: 8px 0; border: 2px solid #fff5f6; border-radius: 15px; outline: none; background: #fffcfc; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: 0.3s; }
        input:focus { border-color: var(--pink-soft); }

        .main-btn { 
            background: linear-gradient(45deg, #ffb6c1, #ff85a2); color: white; border: none; padding: 15px; border-radius: 18px; 
            cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; box-shadow: 0 5px 15px rgba(255, 133, 162, 0.2);
        }

        .msg-card { 
            background: #fffcfc; padding: 15px; margin: 10px 0; border-radius: 18px; border-left: 5px solid var(--pink-bold); 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02); text-align: left; font-size: 13px; line-height: 1.6;
        }

        .visual-img { width: 160px; height: auto; margin: 20px auto; display: block; border-radius: 20px; }
        .footer-name { font-size: 10px; margin: 30px 0; color: #e0e0e0; letter-spacing: 3px; text-transform: uppercase; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p style="margin-top:15px; color:var(--pink-bold);">Memuat Keajaiban...</p></div>

<nav id="main-nav">
    <button onclick="showPage('ideal')">📏<span>Ideal</span></button>
    <button onclick="showPage('pesan')">📩<span>Pesan</span></button>
    <button onclick="showPage('jodoh')">❤️<span>Jodoh</span></button>
    <button onclick="window.logout()" style="color: #ff6b6b;">🚪<span>Keluar</span></button>
</nav>

<div class="container">
    <section id="page-login" class="content-page" style="display:none;">
        <img src="https://cdn-icons-png.flaticon.com/512/3062/3062634.png" style="width:70px; margin-bottom:15px;">
        <h2>Halo, Merpati! ✨</h2>
        <p style="font-size: 13px; opacity: 0.8;">Masuk untuk mengelola pesan anonim kamu.</p>
        <button class="main-btn" onclick="window.handleLogin()">Masuk dengan Google</button>
    </section>

    <div id="main-content" style="display: none;">
        <section id="ideal" class="sub-page">
            <h2>Body Visualizer</h2>
            <select id="gender"><option value="pria">👨 Pria</option><option value="wanita">👩 Wanita</option></select>
            <input type="number" id="tinggi" placeholder="Tinggi (cm) contoh: 160">
            <input type="number" id="berat" placeholder="Berat (kg) contoh: 50">
            <button class="main-btn" onclick="window.hitungVisual()">Lihat Visualisasi</button>
            <div id="hasilBMI" style="display:none; margin-top:25px;">
                <p id="status-teks" style="font-weight:600; font-size: 20px; color:var(--pink-bold); margin:0;"></p>
                <img id="img-visual" class="visual-img" src="">
                <p id="saran-teks" style="font-size:12px; color:#999;"></p>
            </div>
        </section>

        <section id="pesan" class="sub-page" style="display:none;">
            <h2>Kotak Rahasia</h2>
            <div style="background: #fff9fa; padding: 15px; border-radius: 20px; border: 2px dashed var(--pink-soft); margin-bottom: 20px;">
                <p style="font-size:11px; margin-bottom:5px;">Bagikan link ini ke IG/WA:</p>
                <div id="link-display" style="font-size:10px; font-weight:bold; word-break: break-all; color: var(--pink-bold); background: white; padding: 8px; border-radius: 10px;"></div>
                <button class="main-btn" style="padding:10px; font-size:12px;" onclick="window.copyAndShare()">Salin & Buka IG</button>
            </div>
            <h3 style="font-size:15px; text-align:left; color: var(--pink-bold);">Pesan Masuk:</h3>
            <div id="list-pesan"></div>
        </section>

        <section id="jodoh" class="sub-page" style="display:none;">
            <h2>Love Meter</h2>
            <input type="text" id="nama1" placeholder="Nama Kamu">
            <input type="text" id="nama2" placeholder="Nama Pasangan">
            <button class="main-btn" onclick="window.cekJodoh()">Cek Kecocokan ❤️</button>
            <div id="hasilJodoh" style="margin-top:20px; font-size: 35px; font-weight: bold; color: var(--pink-bold);"></div>
        </section>
    </div>

    <section id="page-send-msg" class="content-page" style="display:none;">
        <h2>Kirim Pesan ✨</h2>
        <p style="font-size: 12px; margin-bottom: 15px;">Penerima tidak akan tahu siapa kamu.</p>
        <textarea id="anon-text" rows="5" placeholder="Tulis pesan rahasiamu di sini..."></textarea>
        <button class="main-btn" onclick="window.sendToFirebase()">Kirim Rahasia 🤫</button>
    </section>

    <div class="footer-name">merpati digital creative</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBRUMOALHTCiJ83lBc1KaYc0QcsSIfw5ek",
        authDomain: "webanonymous-128cd.firebaseapp.com",
        projectId: "webanonymous-128cd",
        storageBucket: "webanonymous-128cd.firebasestorage.app",
        messagingSenderId: "789801328425",
        appId: "1:789801328425:web:67467f05e1e2fa2ecba138"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();
    const urlParams = new URLSearchParams(window.location.search);
    const receiverID = urlParams.get('to');

    window.handleLogin = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth).then(() => {
        const cleanUrl = window.location.origin + window.location.pathname;
        window.location.href = cleanUrl;
    });

    onAuthStateChanged(auth, (user) => {
        document.getElementById('loader').style.display = 'none';
        if (user) {
            // Jika ada ID penerima di URL dan itu bukan ID saya sendiri, tampilkan halaman kirim pesan
            if (receiverID && receiverID !== user.uid) { 
                switchSection('page-send-msg'); 
            } else { 
                switchSection('main-content'); 
                document.getElementById('main-nav').style.display = 'flex'; 
                setupDashboard(user); 
            }
        } else { 
            // Jika tidak login, cek apakah sedang ingin mengirim pesan atau mau login
            switchSection(receiverID ? 'page-send-msg' : 'page-login'); 
        }
    });

    function switchSection(id) {
        document.querySelectorAll('.content-page').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    window.showPage = (id) => {
        document.querySelectorAll('.sub-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    };

    function setupDashboard(user) {
        // MENGGUNAKAN UID (Bukan Nama) agar privasi terjaga
        const myLink = window.location.origin + window.location.pathname + "?to=" + user.uid;
        document.getElementById('link-display').innerText = myLink;

        const q = query(collection(db, "messages"), where("receiverID", "==", user.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            let h = ""; 
            snap.forEach(doc => { h += `<div class="msg-card">${doc.data().text}</div>`; });
            document.getElementById('list-pesan').innerHTML = h || "<p style='font-size:12px; opacity:0.5; margin-top:20px;'>Belum ada rahasia masuk...</p>";
        });
    }

    window.hitungVisual = () => {
        const gen = document.getElementById('gender').value;
        const bb = parseFloat(document.getElementById('berat').value);
        const tb = parseFloat(document.getElementById('tinggi').value);
        if(!bb || !tb) return alert("Isi tinggi dan berat badan dulu!");

        const bmi = bb / ((tb/100)**2);
        const hasilDiv = document.getElementById('hasilBMI');
        hasilDiv.style.display = "block";
        
        let s = "", u = "", sr = "";
        
        // LOGIKA GAMBAR BERDASARKAN GENDER & BMI
        if(bmi < 18.5) { 
            s = "Kurus"; 
            u = gen === 'pria' ? "https://cdn-icons-png.flaticon.com/512/4140/4140037.png" : "https://cdn-icons-png.flaticon.com/512/6997/6997662.png"; 
            sr = "Yuk, tambah porsi makan sehatnya!"; 
        } else if(bmi < 25) { 
            s = "Ideal ✨"; 
            u = gen === 'pria' ? "https://cdn-icons-png.flaticon.com/512/4140/4140048.png" : "https://cdn-icons-png.flaticon.com/512/6997/6997671.png"; 
            sr = "Postur tubuhmu sudah sangat bagus!"; 
        } else { 
            s = "Berisi / Overweight"; 
            u = gen === 'pria' ? "https://cdn-icons-png.flaticon.com/512/4140/4140047.png" : "https://cdn-icons-png.flaticon.com/512/6997/6997674.png"; 
            sr = "Jangan lupa olahraga rutin ya!"; 
        }

        document.getElementById('status-teks').innerText = s;
        document.getElementById('img-visual').src = u;
        document.getElementById('saran-teks').innerText = sr;
    };

    window.copyAndShare = () => {
        const link = document.getElementById('link-display').innerText;
        navigator.clipboard.writeText(link).then(() => {
            alert("Link rahasiamu berhasil disalin!");
            window.location.href = "instagram://story-camera";
        });
    };

    window.sendToFirebase = async () => {
        const t = document.getElementById('anon-text').value;
        if(!t) return alert("Tulis sesuatu dulu!");
        try {
            await addDoc(collection(db, "messages"), { 
                receiverID: receiverID, 
                text: t, 
                timestamp: serverTimestamp() 
            });
            alert("Pesan rahasia terkirim!");
            document.getElementById('anon-text').value = "";
            // Kembali ke halaman utama
            location.href = window.location.origin + window.location.pathname;
        } catch (e) {
            alert("Gagal mengirim, coba lagi.");
        }
    };

    window.cekJodoh = () => { 
        if(!document.getElementById('nama1').value || !document.getElementById('nama2').value) return alert("Isi kedua nama dulu!");
        document.getElementById('hasilJodoh').innerText = Math.floor(Math.random() * 40 + 60) + "% ❤️"; 
    };
</script>

</body>
</html>
