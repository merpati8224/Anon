<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunTools - Merpati Premium ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --pink-soft: #ffdee9; --pink-bold: #ff85a2; --cream: #fff5f5; --text: #7d5a5a; --wa-green: #25D366; --ig-gradient: linear-gradient(45deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
        body { font-family: 'Poppins', sans-serif; background: var(--cream); margin: 0; color: var(--text); display: flex; flex-direction: column; align-items: center; min-height: 100vh;}
        
        nav { background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); width: 100%; display: none; justify-content: space-around; padding: 12px 0; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--pink-soft); }
        nav button { background: none; border: none; font-weight: 600; font-size: 11px; cursor: pointer; color: var(--text); }

        .container { background: white; width: 92%; max-width: 400px; margin: 15px auto; padding: 25px; border-radius: 30px; box-shadow: 0 10px 25px rgba(255,182,193,0.2); text-align: center; box-sizing: border-box; flex-grow: 1;}
        h2 { font-family: 'Dancing Script', cursive; color: var(--pink-bold); font-size: 30px; margin-bottom: 20px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #fff5f6; border-radius: 12px; font-family: 'Poppins', sans-serif; box-sizing: border-box; outline: none; font-size: 14px; }
        .main-btn { background: linear-gradient(45deg, #ffb6c1, #ff85a2); color: white; border: none; padding: 14px; border-radius: 15px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; transition: transform 0.1; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Style Baru Fitur Share */
        .share-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; display: none; }
        .btn-share { padding: 8px 15px; border-radius: 10px; border: none; color: white; cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 5px; text-decoration: none; }
        .btn-wa { background-color: var(--wa-green); }
        .btn-ig { background: var(--ig-gradient); }

        /* Fitur Tanya Jawab Style */
        .oracle-section { margin-top: 30px; padding-top: 20px; border-top: 2px dashed var(--pink-soft); }
        .voice-answer { font-style: italic; color: var(--pink-bold); margin-top: 10px; min-height: 20px; font-weight: 600; }

        .fortune-card {
            background: linear-gradient(135deg, #ffffff, #fff0f3);
            border: 2px solid var(--pink-soft);
            padding: 25px;
            border-radius: 25px;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(255, 133, 162, 0.1);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--pink-soft); border-top: 4px solid var(--pink-bold); border-radius: 50%; animation: spin 1s infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .content-page, .sub-page { display: none; opacity: 0; transition: opacity 0.4s ease-in-out; }
        .content-page.active, .sub-page.active { display: block; opacity: 1; }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div><p>Memuat...</p></div>

<nav id="main-nav">
    <button onclick="window.showSubPage('ideal')">📏 Tubuh</button>
    <button onclick="window.showSubPage('ramalan')">🔮 Ramalan</button>
    <button onclick="window.showSubPage('jodoh')">❤️ Jodoh</button>
    <button onclick="window.logout()">🚪 Keluar</button>
</nav>

<div class="container">
    <section id="page-login" class="content-page">
        <h2>Halo, Merpati! ✨</h2>
        <button class="main-btn" onclick="window.handleLogin()">Masuk dengan Google 🚀</button>
    </section>

    <div id="main-content" class="content-page">
        <section id="ideal" class="sub-page active">
            <h2>Body Visualizer</h2>
            <input type="number" id="tinggi" placeholder="Tinggi (cm)">
            <input type="number" id="berat" placeholder="Berat (kg)">
            <button class="main-btn" onclick="window.hitungVisual()">Lihat Hasil</button>
            <div id="hasilBMI" style="display:none; margin-top:20px;">
                <p id="status-teks" style="font-weight:bold; color: var(--pink-bold);"></p>
                <img id="img-visual" style="width:120px; border-radius:10px; margin:10px 0;">
                <p id="bmi-angka" style="font-size:12px; color:#999;"></p>
            </div>
        </section>

        <section id="ramalan" class="sub-page">
            <h2>Ramalan Harian 🔮</h2>
            
            <div id="card-ramalan" class="fortune-card">
                <p id="text-ramalan" class="fortune-text">Memuat nasibmu...</p>
                <div class="fortune-meta">📅 Ramalan Hari Ini</div>
            </div>

            <button class="main-btn" onclick="window.acakRamalan()">🔮 Ambil Ramalan Baru</button>
            
            <div id="share-area" class="share-group">
                <a id="share-wa" class="btn-share btn-wa" target="_blank">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a onclick="alert('Screenshot hasil ramalanmu dan tag @MerpatiCreative di Instagram Story! ✨')" class="btn-share btn-ig">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
            </div>

            <div class="oracle-section">
                <h3>Tanya Masa Depan ✨</h3>
                <input type="text" id="pertanyaan" placeholder="Contoh: Apakah dia jodohku?">
                <button class="main-btn" onclick="window.tanyaOracle()">💬 Tanya Merpati</button>
                <p id="voice-text" class="voice-answer"></p>
            </div>
        </section>

        <section id="jodoh" class="sub-page">
            <h2>Love Meter</h2>
            <input type="text" id="nama1" placeholder="Nama Kamu">
            <input type="text" id="nama2" placeholder="Nama Pasangan">
            <button class="main-btn" onclick="window.cekJodoh()">Cek ❤️</button>
            <h1 id="hasilJodoh" style="color:var(--pink-bold);"></h1>
        </section>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Firebase Init (Gunakan config asli Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyBRUMOALHTCiJ83lBc1KaYc0QcsSIfw5ek",
        authDomain: "webanonymous-128cd.firebaseapp.com",
        projectId: "webanonymous-128cd",
        appId: "1:789801328425:web:67467f05e1e2fa2ecba138"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const daftarRamalan = [
        "Keberuntungan besar akan datang kepadamu melalui orang baru.",
        "Hari ini waktu yang tepat untuk mengungkapkan perasaanmu.",
        "Dompetmu akan segera menebal, ada rezeki tak terduga!",
        "Seseorang sedang memperhatikanmu secara diam-diam.",
        "Aura kamu hari ini sangat bersinar, banyak orang ingin di dekatmu."
    ];

    // JAWABAN TANYA JAWAB
    const jawabanOracle = [
        "Sangat mungkin terjadi!",
        "Tidak mungkin, jangan berharap dulu ya.",
        "Bisa jadi, tergantung usahamu.",
        "Pasti Harus! Itu sudah takdirmu.",
        "Sepertinya tidak mungkin untuk saat ini.",
        "Tentu saja bisa jadi!",
        "Sudah pasti!",
        "Coba tanya lagi besok ya manis."
    ];

    window.handleLogin = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth).then(() => { window.location.reload(); });

    window.showSubPage = (id) => {
        document.querySelectorAll('.sub-page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    };

    // FUNGSI RAMALAN + SHARE
    window.acakRamalan = () => {
        const text = document.getElementById('text-ramalan');
        const card = document.getElementById('card-ramalan');
        const shareArea = document.getElementById('share-area');
        
        card.style.display = 'block';
        text.innerText = "Membaca takdirmu...";
        
        setTimeout(() => {
            const hasil = daftarRamalan[Math.floor(Math.random() * daftarRamalan.length)];
            text.innerText = hasil;
            shareArea.style.display = 'flex';
            
            // Set link WhatsApp
            const waLink = `https://api.whatsapp.com/send?text=Ramalan Merpati hari ini: "${hasil}" ✨ Cek ramalanmu di FunTools!`;
            document.getElementById('share-wa').href = waLink;
        }, 800);
    };

    // FUNGSI TANYA JAWAB + SUARA
    window.tanyaOracle = () => {
        const tanya = document.getElementById('pertanyaan').value;
        const outText = document.getElementById('voice-text');
        
        if(!tanya) return alert("Tanya dulu dong...");

        const jawab = jawabanOracle[Math.floor(Math.random() * jawabanOracle.length)];
        outText.innerText = "Sedang membisikkan jawaban...";

        // Fungsi Suara Cantik
        const speech = new SpeechSynthesisUtterance();
        speech.text = jawab;
        speech.lang = 'id-ID';
        speech.rate = 0.9; // Agak lambat biar elegan
        speech.pitch = 1.2; // Suara lebih tinggi/feminin cantik
        
        speech.onend = () => {
            outText.innerText = "Jawaban: " + jawab;
        };

        window.speechSynthesis.speak(speech);
    };

    onAuthStateChanged(auth, (user) => {
        document.getElementById('loader').style.display = 'none';
        document.querySelectorAll('.content-page').forEach(s => s.classList.remove('active'));
        if (user) {
            document.getElementById('main-content').classList.add('active'); 
            document.getElementById('main-nav').style.display = 'flex';
        } else {
            document.getElementById('page-login').classList.add('active');
        }
    });

    // ... (Script hitungVisual & cekJodoh tetap sama seperti sebelumnya) ...
    window.hitungVisual = () => {
        const bb = parseFloat(document.getElementById('berat').value);
        const tb = parseFloat(document.getElementById('tinggi').value);
        if(!bb || !tb) return alert("Isi data dulu!");
        const bmi = bb / ((tb/100)**2);
        document.getElementById('hasilBMI').style.display = "block";
        document.getElementById('status-teks').innerText = bmi < 24 ? "Ideal ✨" : "Berisi";
        document.getElementById('bmi-angka').innerText = `BMI: ${bmi.toFixed(1)}`;
        document.getElementById('img-visual').src = "https://i.postimg.cc/NjHJgvtQ/AVATAR.jpg";
    };

    window.cekJodoh = () => {
        const n1 = document.getElementById('nama1').value;
        const n2 = document.getElementById('nama2').value;
        if(!n1 || !n2) return alert("Masukkan nama!");
        document.getElementById('hasilJodoh').innerText = Math.floor(Math.random()*40 + 60) + "% ❤️";
    };
</script>

</body>
</html>
